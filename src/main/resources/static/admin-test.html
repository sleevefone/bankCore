<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bank Core Admin</title>
    <style>
        :root {
            --bg:#f5f7fb;
            --card:#fff;
            --line:#d8e1ed;
            --text:#17212f;
            --muted:#6b7787;
            --primary:#0b69ff;
            --ok:#118847;
            --err:#c62828;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .wrap { max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        h1 { margin: 0 0 12px; font-size: 22px; }
        .menu { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .menu button {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .menu button.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }
        h2 { margin: 0 0 10px; font-size: 17px; }
        .tips { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
        .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        input, select, button {
            border-radius: 8px;
            font-size: 14px;
            padding: 8px 10px;
            border: 1px solid var(--line);
        }
        input, select { min-width: 170px; background: #fff; }
        button.action {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            cursor: pointer;
        }
        .meta { color: var(--muted); font-size: 12px; margin: 4px 0 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            border-bottom: 1px solid var(--line);
            text-align: left;
            padding: 8px;
            font-size: 13px;
            white-space: nowrap;
        }
        .op-btn {
            display: inline-block;
            text-decoration: none;
            background: #eaf2ff;
            color: #1b4fbf;
            border: 1px solid #cddfff;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
        }
        .empty { color: var(--muted); text-align: center; padding: 12px; }
        .msg { margin: 8px 0; font-size: 13px; }
        .ok { color: var(--ok); }
        .err { color: var(--err); }
        pre {
            margin: 0;
            background: #0e1726;
            color: #cde3ff;
            padding: 10px;
            border-radius: 8px;
            min-height: 72px;
            overflow: auto;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>核心后管测试页</h1>

    <div class="menu">
        <button id="menu-open" class="active" onclick="switchPanel('open')">开户操作页</button>
        <button id="menu-customer" onclick="switchPanel('customer')">客户主表页</button>
        <button id="menu-account" onclick="switchPanel('account')">账号主表页</button>
    </div>

    <div id="panel-open" class="panel active">
        <div class="card">
            <h2>客户开户</h2>
            <div class="tips">先创建客户，再创建账号。</div>
            <div class="row">
                <input id="cNo" placeholder="customerNo">
                <input id="cName" placeholder="customerName">
                <input id="cMobile" placeholder="mobile">
                <input id="cIdNo" placeholder="idNo">
                <button class="action" onclick="createCustomer()">创建客户</button>
            </div>
        </div>
        <div class="card">
            <h2>账号开户</h2>
            <div class="row">
                <input id="aCustomerNo" placeholder="customerNo">
                <input id="aCurrency" value="CNY" placeholder="currency">
                <select id="aSubjectCode" onchange="refreshSubjectUsageTip()">
                    <option value="201001" data-usage="存款本金负债科目：用于记录客户存款本金。">201001 - 存款本金（客户资金沉淀）</option>
                    <option value="130101" data-usage="贷款本金资产科目：用于记录客户贷款本金。">130101 - 贷款本金（客户授信放款）</option>
                    <option value="201002" data-usage="存款利息相关科目：用于存款利息计提/结息扩展。">201002 - 存款利息（计提/结息）</option>
                    <option value="130102" data-usage="贷款利息相关科目：用于贷款利息计提/收息扩展。">130102 - 贷款利息（计提/收息）</option>
                </select>
                <select id="aDirection">
                    <option value="DEBIT">DEBIT</option>
                    <option value="CREDIT">CREDIT</option>
                </select>
                <input id="aRate" placeholder="interestRate (可空)">
                <button class="action" onclick="openDeposit()">开存款账号</button>
                <button class="action" onclick="openLoan()">开贷款账号</button>
            </div>
            <div class="tips" id="subjectUsageTip"></div>
        </div>
    </div>

    <div id="panel-customer" class="panel">
        <div class="card">
            <h2>客户主表列表</h2>
            <div class="row">
                <input id="sCustomerNo" placeholder="customerNo">
                <input id="sCustomerName" placeholder="customerName">
                <input id="sMobile" placeholder="mobile">
                <input id="sCustomerPageNo" value="1" placeholder="pageNo">
                <input id="sCustomerPageSize" value="20" placeholder="pageSize">
                <button class="action" onclick="searchCustomers()">查询客户列表</button>
            </div>
            <div class="meta" id="customerMeta"></div>
            <table>
                <thead>
                <tr>
                    <th>customerNo</th>
                    <th>customerName</th>
                    <th>mobile</th>
                    <th>idNo</th>
                    <th>status</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="customerTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="panel-account" class="panel">
        <div class="card">
            <h2>账号主表列表</h2>
            <div class="row">
                <input id="sAccountCustomerNo" placeholder="customerNo">
                <input id="sAccountNo" placeholder="accountNo">
                <select id="sAccountType">
                    <option value="">全部账户类型</option>
                    <option value="DEPOSIT">DEPOSIT</option>
                    <option value="LOAN">LOAN</option>
                    <option value="CUSTOMER">CUSTOMER</option>
                    <option value="MERCHANT">MERCHANT</option>
                    <option value="INTERNAL">INTERNAL</option>
                    <option value="CLEARING">CLEARING</option>
                </select>
                <input id="sAccountPageNo" value="1" placeholder="pageNo">
                <input id="sAccountPageSize" value="20" placeholder="pageSize">
                <button class="action" onclick="searchAccounts()">查询账号列表</button>
            </div>
            <div class="meta" id="accountMeta"></div>
            <table>
                <thead>
                <tr>
                    <th>accountNo</th>
                    <th>customerNo</th>
                    <th>accountType</th>
                    <th>currency</th>
                    <th>availableBalance</th>
                    <th>frozenBalance</th>
                    <th>status</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="accountTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>操作状态</h2>
        <div id="msg" class="msg"></div>
        <details>
            <summary>调试 JSON（可选）</summary>
            <pre id="out"></pre>
        </details>
    </div>
</div>

<script>
    const out = document.getElementById("out");
    const msg = document.getElementById("msg");

    function showOk(title, data) {
        msg.innerHTML = `<span class="ok">${escapeHtml(title)}</span>`;
        out.textContent = data ? JSON.stringify(data, null, 2) : "";
    }

    function showErr(title, data) {
        msg.innerHTML = `<span class="err">${escapeHtml(title)}</span>`;
        out.textContent = JSON.stringify(data || {}, null, 2);
    }

    function escapeHtml(v) {
        return String(v)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function numberOrNull(v) {
        if (!v) return null;
        const n = Number(v);
        return Number.isNaN(n) ? null : n;
    }

    async function req(url, method, body) {
        const res = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: body ? JSON.stringify(body) : undefined
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw data;
        return data;
    }

    function switchPanel(name) {
        document.getElementById("panel-open").classList.toggle("active", name === "open");
        document.getElementById("panel-customer").classList.toggle("active", name === "customer");
        document.getElementById("panel-account").classList.toggle("active", name === "account");
        document.getElementById("menu-open").classList.toggle("active", name === "open");
        document.getElementById("menu-customer").classList.toggle("active", name === "customer");
        document.getElementById("menu-account").classList.toggle("active", name === "account");

        if (name === "customer") {
            searchCustomers();
        } else if (name === "account") {
            searchAccounts();
        }
    }

    function panelFromQuery() {
        const panel = new URLSearchParams(window.location.search).get("panel");
        if (panel === "customer" || panel === "account" || panel === "open") {
            switchPanel(panel);
        }
    }

    function renderEmpty(tbodyId, colSpan, text) {
        document.getElementById(tbodyId).innerHTML = `<tr><td class="empty" colspan="${colSpan}">${escapeHtml(text)}</td></tr>`;
    }

    function customerDetailUrl(customerNo) {
        return `/admin-customer-detail.html?customerNo=${encodeURIComponent(customerNo)}`;
    }

    function accountDetailUrl(accountNo) {
        return `/admin-account-detail.html?accountNo=${encodeURIComponent(accountNo)}`;
    }

    async function createCustomer() {
        try {
            const data = await req("/admin/customers", "POST", {
                customerNo: cNo.value.trim(),
                customerName: cName.value.trim(),
                mobile: cMobile.value.trim(),
                idNo: cIdNo.value.trim()
            });
            showOk("创建客户成功", data);
        } catch (e) {
            showErr("创建客户失败", e);
        }
    }

    function accountPayload() {
        return {
            customerNo: aCustomerNo.value.trim(),
            currency: aCurrency.value.trim(),
            subjectCode: aSubjectCode.value.trim(),
            normalBalanceDirection: aDirection.value,
            interestRate: numberOrNull(aRate.value.trim())
        };
    }

    function applyDefaultSubject(accountType) {
        const defaultSubject = accountType === "DEPOSIT" ? "201001" : "130101";
        if (!aSubjectCode.value || aSubjectCode.value === "201001" || aSubjectCode.value === "130101") {
            aSubjectCode.value = defaultSubject;
        }
        refreshSubjectUsageTip();
    }

    function refreshSubjectUsageTip() {
        const usage = aSubjectCode.options[aSubjectCode.selectedIndex]?.dataset?.usage || "";
        document.getElementById("subjectUsageTip").textContent = `科目作用：${usage}`;
    }

    async function openDeposit() {
        try {
            applyDefaultSubject("DEPOSIT");
            const data = await req("/admin/accounts/deposit", "POST", accountPayload());
            showOk("开存款账号成功", data);
        } catch (e) {
            showErr("开存款账号失败", e);
        }
    }

    async function openLoan() {
        try {
            applyDefaultSubject("LOAN");
            const data = await req("/admin/accounts/loan", "POST", accountPayload());
            showOk("开贷款账号成功", data);
        } catch (e) {
            showErr("开贷款账号失败", e);
        }
    }

    async function searchCustomers() {
        try {
            const params = new URLSearchParams({
                customerNo: sCustomerNo.value.trim(),
                customerName: sCustomerName.value.trim(),
                mobile: sMobile.value.trim(),
                pageNo: sCustomerPageNo.value.trim() || "1",
                pageSize: sCustomerPageSize.value.trim() || "20"
            });
            const data = await req(`/admin/customers?${params.toString()}`, "GET");
            const records = Array.isArray(data.records) ? data.records : [];
            document.getElementById("customerMeta").textContent = `共 ${data.total || 0} 条，当前第 ${data.pageNo || 1} 页，每页 ${data.pageSize || 20} 条`;
            if (records.length === 0) {
                renderEmpty("customerTableBody", 6, "暂无客户数据");
                showOk("客户列表为空", data);
                return;
            }
            document.getElementById("customerTableBody").innerHTML = records.map(r => `
                <tr>
                    <td>${escapeHtml(r.customerNo || "")}</td>
                    <td>${escapeHtml(r.customerName || "")}</td>
                    <td>${escapeHtml(r.mobile || "")}</td>
                    <td>${escapeHtml(r.idNo || "")}</td>
                    <td>${escapeHtml(r.status || "")}</td>
                    <td><a class="op-btn" href="${customerDetailUrl(r.customerNo || "")}">查看详情</a></td>
                </tr>
            `).join("");
            showOk("客户列表查询成功", data);
        } catch (e) {
            renderEmpty("customerTableBody", 6, "加载失败");
            showErr("客户列表查询失败", e);
        }
    }

    async function searchAccounts() {
        try {
            const params = new URLSearchParams({
                customerNo: sAccountCustomerNo.value.trim(),
                accountNo: sAccountNo.value.trim(),
                accountType: sAccountType.value.trim(),
                pageNo: sAccountPageNo.value.trim() || "1",
                pageSize: sAccountPageSize.value.trim() || "20"
            });
            const data = await req(`/admin/accounts?${params.toString()}`, "GET");
            const records = Array.isArray(data.records) ? data.records : [];
            document.getElementById("accountMeta").textContent = `共 ${data.total || 0} 条，当前第 ${data.pageNo || 1} 页，每页 ${data.pageSize || 20} 条`;
            if (records.length === 0) {
                renderEmpty("accountTableBody", 8, "暂无账号数据");
                showOk("账号列表为空", data);
                return;
            }
            document.getElementById("accountTableBody").innerHTML = records.map(r => `
                <tr>
                    <td>${escapeHtml(r.accountNo || "")}</td>
                    <td>${escapeHtml(r.customerNo || "")}</td>
                    <td>${escapeHtml(r.accountType || "")}</td>
                    <td>${escapeHtml(r.currency || "")}</td>
                    <td>${escapeHtml(r.availableBalance ?? "")}</td>
                    <td>${escapeHtml(r.frozenBalance ?? "")}</td>
                    <td>${escapeHtml(r.status || "")}</td>
                    <td><a class="op-btn" href="${accountDetailUrl(r.accountNo || "")}">查看详情</a></td>
                </tr>
            `).join("");
            showOk("账号列表查询成功", data);
        } catch (e) {
            renderEmpty("accountTableBody", 8, "加载失败");
            showErr("账号列表查询失败", e);
        }
    }

    panelFromQuery();
    applyDefaultSubject("DEPOSIT");
</script>
</body>
</html>
